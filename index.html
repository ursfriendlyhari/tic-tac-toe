<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <!-- Google Fonts and Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    </head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="game-title">Tic-Tac-Toe</h1>
            <p id="instructions">Click on a cell to make your move. Player X goes first.</p>
            <div class="scoreboard">
                <div class="score">
                    <span id="player-x-score">Player X: 0</span>
                </div>
                <div class="score">
                    <span id="draw-score">Draws: 0</span>
                </div>
                <div class="score">
                    <span id="player-o-score">Player O: 0</span>
                </div>
            </div>
        </div>
        <div class="game-board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
    </div>
    <script src="index.js"></script>
    <div class="button-container">
        <button id="new-match-button">New Match</button>
        <button id="reset-scores-button">Reset Scores</button>
    </div>
</body>
